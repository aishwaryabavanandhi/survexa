name: Survexa Selenium 350 Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install root dependencies
      run: npm install

    - name: Install backend dependencies
      run: |
        cd backend
        npm install

    - name: Start Backend
      run: |
        cd backend
        npm start &
        sleep 5

    - name: Start Frontend
      run: |
        npm run dev &
        npx wait-on http://localhost:5173 --timeout 30000

    - name: Setup Selenium environment
      run: |
        cd selenium
        npm install

    - name: Ensure test directories and reports exist
      run: |
        mkdir -p selenium/reports/excel
        mkdir -p reports/excel

    - name: Run Selenium Test Suite
      run: |
        cd selenium
        npm run test

    - name: Generate Excel Report
      if: always()
      run: |
        # If the test suite didn't already generate it, we make sure it does
        cd selenium
        node run_and_report.js || true

    - name: Upload Excel Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Selenium_Test_Report
        path: |
          reports/excel/Selenium_Test_Report.xlsx
          selenium/reports/excel/Selenium_Test_Report.xlsx
        retention-days: 14
