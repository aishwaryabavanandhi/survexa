name: Survexa Mobile E2E Tests — Appium CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'survexa-appium-framework/**'
      - 'SurveyForge/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      device_type:
        description: 'Device type (emulator/real)'
        required: true
        default: 'emulator'
        type: choice
        options:
          - emulator
          - real
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - auth
          - survey
          - navigation
          - payments
          - gestures

env:
  NODE_VERSION: '18'
  JAVA_VERSION: '17'
  API_LEVEL: '34'
  AVD_NAME: 'Pixel_6_API_34'
  APPIUM_VERSION: '2.x'

jobs:
  mobile-e2e:
    name: 📱 Android E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      # ─── 2. Node.js ────────────────────────────────────────────────
      - name: 🟩 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: survexa-appium-framework/package-lock.json

      # ─── 3. Java ───────────────────────────────────────────────────
      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      # ─── 4. Android SDK ────────────────────────────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ─── 5. Create AVD ─────────────────────────────────────────────
      - name: 📲 Create Android Emulator (AVD)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          target: google_apis
          arch: x86_64
          profile: Pixel 6
          avd-name: ${{ env.AVD_NAME }}
          disable-animations: true
          script: echo "AVD created"

      # ─── 6. Install Appium 2.x ─────────────────────────────────────
      - name: 🔧 Install Appium 2.x + UiAutomator2 Driver
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium --version
        
      # ─── 7. Install Dependencies ───────────────────────────────────
      - name: 📦 Install Framework Dependencies
        working-directory: survexa-appium-framework
        run: npm ci

      # ─── 8. Create .env ────────────────────────────────────────────
      - name: ⚙️ Create .env file
        working-directory: survexa-appium-framework
        env:
          TEST_EMAIL: "${{ secrets.TEST_EMAIL || 'testuser@survexa.test' }}"
          TEST_PASSWORD: "${{ secrets.TEST_PASSWORD || 'TestPassword123!' }}"
        run: |
          cat > .env << EOF
          DEVICE_TYPE=emulator
          AVD_NAME=${{ env.AVD_NAME }}
          APK_PATH=../app-release.apk
          APP_PACKAGE=com.survexa.app
          APP_ACTIVITY=com.survexa.app.MainActivity
          APPIUM_HOST=127.0.0.1
          APPIUM_PORT=4723
          TEST_EMAIL=$TEST_EMAIL
          TEST_PASSWORD=$TEST_PASSWORD
          BACKEND_URL=http://localhost:5000
          ELEMENT_WAIT_TIMEOUT=20000
          PAGE_LOAD_TIMEOUT=30000
          EOF

      # ─── 9. Start Backend ──────────────────────────────────────────
      - name: 🚀 Start Survexa Backend
        working-directory: SurveyForge/backend
        run: |
          npm ci
          JWT_SECRET=ci-test-secret \
          EMAIL_USER=test@test.com \
          EMAIL_PASS=testpass \
          NODE_ENV=development \
          nohup node server.js > backend.log 2>&1 &
          sleep 5
          curl -f http://localhost:5000/health || echo "Backend health check failed (non-fatal)"

      # ─── 10. Start Appium Server ───────────────────────────────────
      - name: ▶️ Start Appium Server
        run: |
          nohup appium --port 4723 --log-level info > appium.log 2>&1 &
          sleep 8

      # ─── 11. Run E2E Tests ─────────────────────────────────────────
      - name: 🧪 Run E2E Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          target: google_apis
          arch: x86_64
          avd-name: ${{ env.AVD_NAME }}
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: |
            cd survexa-appium-framework
            npm run test:${{ github.event.inputs.test_suite || 'auth' }} 2>&1 || true

      # ─── 12. Upload Reports ────────────────────────────────────────
      - name: 📊 Upload Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mobile_E2E_Excel_Report
          path: survexa-appium-framework/excel/*.xlsx
          retention-days: 30

      - name: 📄 Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mochawesome_HTML_Report
          path: survexa-appium-framework/reports/html/
          retention-days: 30

      - name: 📸 Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Failure_Screenshots
          path: survexa-appium-framework/reports/screenshots/
          retention-days: 30

      - name: 📋 Upload Device Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Device_Logs
          path: survexa-appium-framework/logs/
          retention-days: 30

      - name: 🔧 Upload Appium Server Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium_Server_Log
          path: appium.log
          retention-days: 7
